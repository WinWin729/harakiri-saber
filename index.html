<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ハラキリセイバー — 試作之伍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#15110d; --sumi2:#211b15;
    --washi:#e6d9bf; --washi-dim:#9a8d74;
    --hi:#c3272b; --hi-bright:#e8453c;
    --kane:#c79a3e; --tetsu:#46403a; --line:#3a332b;
    --tagiri:#3e8f7a; --heal:#8fd07a; --mikiri:#9fd8e8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--sumi);
    background-image:radial-gradient(ellipse at 50% -20%, #2a2118 0%, var(--sumi) 60%);
    color:var(--washi);
    font-family:'Zen Kaku Gothic New',sans-serif;
    overflow-x:hidden; min-height:100%;
  }
  #app{max-width:760px;margin:0 auto;padding:10px 12px 18px;position:relative;
       transition:filter .8s, transform .6s;transform-origin:50% 40%;}
  /* 死地アドレナリン / 覚悟最大の昂ぶり */
  body.adre1 #app{transform:scale(1.012);filter:saturate(1.15) contrast(1.02);}
  body.adre2 #app{transform:scale(1.022);filter:saturate(1.3) contrast(1.06);}
  #furyEdge{
    position:fixed;inset:0;pointer-events:none;z-index:86;opacity:0;transition:opacity .6s;
    box-shadow:inset 0 0 90px 26px rgba(199,154,62,.45);
  }
  body.adre2 #furyEdge{opacity:1;animation:furyPulse .9s ease-in-out infinite;}
  @keyframes furyPulse{
    0%,100%{box-shadow:inset 0 0 80px 22px rgba(199,154,62,.35);}
    50%{box-shadow:inset 0 0 120px 40px rgba(214,170,70,.6);}
  }

  /* 本物のヒットストップ */
  .hitstop *{animation-play-state:paused !important;}

  #dimEdges{
    position:fixed;inset:0;pointer-events:none;z-index:87;opacity:0;transition:opacity .8s;
    backdrop-filter:blur(2px) saturate(.75);
    -webkit-backdrop-filter:blur(2px) saturate(.75);
    mask-image:radial-gradient(ellipse 100% 120% at 50% 80%, transparent 68%, #000 96%);
    -webkit-mask-image:radial-gradient(ellipse 100% 120% at 50% 80%, transparent 68%, #000 96%);
  }
  #dimEdges.low{opacity:1;}

  .hpThreat{
    position:absolute;top:0;height:100%;z-index:2;pointer-events:none;
    background:rgba(232,69,60,.6);border-radius:2px;
    animation:threatBlink 1s ease-in-out infinite;
  }
  .hpThreat.lethal{background:rgba(255,45,40,.8);animation:threatBlink .4s steps(2,end) infinite;}
  @keyframes threatBlink{0%,100%{opacity:.12;}50%{opacity:.85;}}

  .hpFill.player{overflow:visible;}
  .hpFill.player.hurtSeq{transition:width 1.4s cubic-bezier(.3,.65,.35,1) .55s;}
  .hpFill.player.hurtSeq::after{
    content:"";position:absolute;inset:0;background:#ff3b30;border-radius:2px;
    animation:redBlink .16s steps(2,end) 5;opacity:0;
  }
  @keyframes redBlink{0%{opacity:1;}100%{opacity:0;}}

  #bloodflash{
    position:fixed;inset:0;pointer-events:none;z-index:90;
    background:radial-gradient(ellipse at 50% 100%, rgba(195,39,43,.55), transparent 70%);
    opacity:0;transition:opacity .5s;
  }
  #bloodflash.on{opacity:1;transition:opacity .05s;}
  #goldflash{
    position:fixed;inset:0;pointer-events:none;z-index:92;
    background:radial-gradient(ellipse at 50% 40%, rgba(199,154,62,.5), transparent 70%);
    opacity:0;transition:opacity .8s;
  }
  #goldflash.on{opacity:1;transition:opacity .05s;}
  #killflash{
    position:fixed;inset:0;pointer-events:none;z-index:98;
    background:#f5ead2;opacity:0;
  }
  #killflash.on{animation:killWhite .9s ease-out forwards;}
  @keyframes killWhite{0%{opacity:0;}8%{opacity:1;}100%{opacity:0;}}
  #zan{
    position:fixed;left:0;right:0;top:30%;z-index:99;pointer-events:none;
    text-align:center;font-family:'Shippori Mincho',serif;font-weight:800;
    font-size:7rem;color:var(--hi);opacity:0;
    text-shadow:0 0 40px rgba(195,39,43,.7), 0 4px 0 #5e0e10;
  }
  #zan.on{animation:zanPop 1.1s cubic-bezier(.2,.9,.3,1) forwards;}
  @keyframes zanPop{
    0%{opacity:0;transform:scale(2.4) rotate(-6deg);}
    18%{opacity:1;transform:scale(1) rotate(-6deg);}
    70%{opacity:1;transform:scale(1.03) rotate(-6deg);}
    100%{opacity:0;transform:scale(1.06) rotate(-6deg);}
  }

  #kaiWrap{position:fixed;inset:0;z-index:103;pointer-events:none;display:none;}
  #kaiWrap.on{display:block;}
  .kaiHalf{position:absolute;inset:0;background:#070503;opacity:0;transition:opacity .28s;}
  .kaiHalf.a{clip-path:polygon(0 0,100% 0,100% 34%,0 64%);}
  .kaiHalf.b{clip-path:polygon(0 64%,100% 34%,100% 100%,0 100%);}
  #kaiWrap.dark .kaiHalf{opacity:1;}
  #kaiWrap.split .kaiHalf{transition:transform .5s cubic-bezier(.2,.8,.3,1), opacity .5s ease .15s;opacity:0;}
  #kaiWrap.split .kaiHalf.a{transform:translate(-3%,-9%);}
  #kaiWrap.split .kaiHalf.b{transform:translate(3%,9%);}
  #kaiSlash{
    position:absolute;left:0;top:50%;height:4px;width:100%;
    background:linear-gradient(90deg,transparent,#fff 18%,#ffeccb 50%,#fff 82%,transparent);
    box-shadow:0 0 26px #fff, 0 0 60px rgba(255,236,203,.8);
    transform:translateY(-50%) rotate(var(--kang,-8deg)) scaleX(0);
    transform-origin:left center;
  }
  #kaiWrap.flash #kaiSlash{animation:kaiSweep .22s cubic-bezier(.2,0,.2,1) forwards;}
  @keyframes kaiSweep{
    0%{transform:translateY(-50%) rotate(var(--kang,-8deg)) scaleX(0);}
    100%{transform:translateY(-50%) rotate(var(--kang,-8deg)) scaleX(1);}
  }

  #vignette{
    position:fixed;inset:0;pointer-events:none;z-index:88;opacity:0;
    box-shadow:inset 0 0 120px 50px rgba(150,12,16,.65);
    transition:opacity .6s;
  }
  #vignette.low{opacity:1;animation:heartbeat 1.1s ease-in-out infinite;}
  @keyframes heartbeat{
    0%,100%{box-shadow:inset 0 0 110px 42px rgba(150,12,16,.5);}
    12%{box-shadow:inset 0 0 150px 70px rgba(190,18,22,.8);}
    24%{box-shadow:inset 0 0 120px 50px rgba(150,12,16,.55);}
    34%{box-shadow:inset 0 0 140px 62px rgba(180,16,20,.7);}
  }
  #bloodLayer{position:fixed;inset:0;pointer-events:none;z-index:95;overflow:hidden;}
  .splat{
    position:absolute;border-radius:48% 52% 55% 45% / 52% 46% 54% 48%;
    background:radial-gradient(circle at 35% 35%, rgba(232,69,60,.95), rgba(122,16,18,.85) 55%, rgba(70,7,9,.75));
    animation:splat .85s ease-out forwards;
  }
  @keyframes splat{
    0%{transform:scale(.2) rotate(var(--rot));opacity:0;}
    10%{transform:scale(1.08) rotate(var(--rot));opacity:1;}
    100%{transform:scale(1.2) rotate(var(--rot)) translateY(16px);opacity:0;}
  }

  .dmgPop{
    position:fixed;z-index:96;pointer-events:none;
    font-family:'Shippori Mincho',serif;font-weight:800;
    font-size:1.7rem;color:var(--hi-bright);
    text-shadow:0 2px 8px rgba(0,0,0,.8), 0 0 14px rgba(232,69,60,.4);
    animation:popRise .9s ease-out forwards;
  }
  .dmgPop.boost{color:var(--kane);font-size:2.2rem;text-shadow:0 2px 8px rgba(0,0,0,.8),0 0 20px rgba(199,154,62,.7);}
  .dmgPop.mega{font-size:3rem !important;animation:popMega 1s ease-out forwards;}
  @keyframes popMega{
    0%{transform:translateY(10px) scale(.4);opacity:0;}
    12%{transform:translateY(0) scale(1.35);opacity:1;}
    30%{transform:translateY(-4px) scale(1.05);}
    100%{transform:translateY(-50px) scale(1);opacity:0;}
  }
  .dmgPop.hurt{color:#ff7a72;font-size:1.4rem;}
  .dmgPop.heal{color:var(--heal);font-size:1.4rem;}
  .dmgPop.tagiri{color:#6fd0b4;font-size:1.4rem;}
  @keyframes popRise{
    0%{transform:translateY(8px) scale(.6);opacity:0;}
    15%{transform:translateY(0) scale(1.15);opacity:1;}
    35%{transform:translateY(-6px) scale(1);}
    100%{transform:translateY(-42px) scale(.95);opacity:0;}
  }

  /* 武器別斬撃エフェクト */
  .fx{position:absolute;pointer-events:none;z-index:6;}
  .fxLong{
    left:4%;right:4%;top:46%;height:3px;
    background:linear-gradient(90deg,transparent,#fff 30%,#fff 70%,transparent);
    box-shadow:0 0 16px #fff;transform:scaleX(0);transform-origin:left;
    animation:fxSweep .26s ease-out forwards;
  }
  @keyframes fxSweep{
    0%{transform:scaleX(0);opacity:1;}
    55%{transform:scaleX(1);opacity:1;}
    100%{transform:scaleX(1);opacity:0;}
  }
  .fxDag{
    width:52px;height:2px;background:#fff;box-shadow:0 0 10px #fff;
    animation:fxDag .24s ease-out forwards;opacity:0;
  }
  @keyframes fxDag{
    0%{opacity:0;transform:rotate(var(--ang)) scaleX(.2);}
    25%{opacity:1;transform:rotate(var(--ang)) scaleX(1.1);}
    100%{opacity:0;transform:rotate(var(--ang)) scaleX(1.2) translateX(8px);}
  }
  .fxSpear{
    width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle,#fff 20%,rgba(255,236,203,.7) 50%,transparent 75%);
    box-shadow:0 0 18px #fff;
    animation:fxThrust .26s ease-out forwards;
  }
  @keyframes fxThrust{
    0%{transform:scale(.2);opacity:1;}
    45%{transform:scale(1.6);opacity:1;}
    100%{transform:scale(2.6);opacity:0;}
  }

  /* 連撃カウンター */
  #comboPop{
    position:fixed;right:5%;bottom:34%;z-index:96;pointer-events:none;
    font-family:'Shippori Mincho',serif;font-weight:800;color:var(--kane);
    text-shadow:0 0 16px rgba(199,154,62,.7), 0 2px 0 #4a3812;
    opacity:0;
  }
  #comboPop.on{animation:comboPop .55s cubic-bezier(.2,1.4,.4,1) forwards;}
  @keyframes comboPop{
    0%{opacity:0;transform:scale(.5) rotate(4deg);}
    30%{opacity:1;transform:scale(1.25) rotate(-2deg);}
    60%{transform:scale(1) rotate(0);}
    100%{opacity:0;transform:scale(1) translateY(-14px);}
  }

  /* ターン合計の叩きつけ */
  #turnTotal{
    position:fixed;left:0;right:0;top:46%;z-index:97;pointer-events:none;
    text-align:center;font-family:'Shippori Mincho',serif;font-weight:800;
    color:var(--washi);opacity:0;
  }
  #turnTotal .tLbl{font-size:.9rem;letter-spacing:.4em;color:var(--washi-dim);display:block;}
  #turnTotal .tNum{font-size:3.4rem;color:var(--kane);text-shadow:0 0 28px rgba(199,154,62,.6), 0 3px 0 #4a3812;}
  #turnTotal.on{animation:turnSlam 1.1s cubic-bezier(.15,1.2,.3,1) forwards;}
  @keyframes turnSlam{
    0%{opacity:0;transform:scale(1.8);}
    18%{opacity:1;transform:scale(.96);}
    28%{transform:scale(1.02);}
    75%{opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(1) translateY(-16px);}
  }

  #banner{
    position:fixed;left:0;right:0;top:38%;z-index:97;pointer-events:none;
    text-align:center;font-family:'Shippori Mincho',serif;font-weight:800;
    font-size:2rem;letter-spacing:.6em;text-indent:.6em;color:var(--washi);
    text-shadow:0 0 24px rgba(0,0,0,.9);opacity:0;
  }
  #banner.show{animation:bannerSweep 1s ease-out forwards;}
  #banner.foe{color:var(--hi-bright);}
  #banner.rankup{
    color:var(--kane);font-size:2.6rem;
    text-shadow:0 0 36px rgba(199,154,62,.8), 0 2px 0 #5a4112;
  }
  #banner.mikiri{
    color:var(--mikiri);font-size:2.4rem;
    text-shadow:0 0 32px rgba(159,216,232,.8), 0 2px 0 #1d4a58;
  }
  #banner.stagger{
    color:#ffb35e;font-size:2.4rem;
    text-shadow:0 0 32px rgba(255,179,94,.8), 0 2px 0 #6e4210;
  }
  @keyframes bannerSweep{
    0%{opacity:0;transform:translateX(40px);}
    20%{opacity:1;transform:translateX(0);}
    75%{opacity:1;}
    100%{opacity:0;transform:translateX(-30px);}
  }

  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-7px)}40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}80%{transform:translateX(3px)}
  }
  .shake{animation:shake .35s;}
  @keyframes bigshake{
    0%,100%{transform:translate(0,0)}
    15%{transform:translate(-11px,3px)}30%{transform:translate(9px,-4px)}
    45%{transform:translate(-7px,2px)}60%{transform:translate(6px,-2px)}
    75%{transform:translate(-4px,1px)}
  }
  .bigshake{animation:bigshake .5s;}
  @keyframes punch{0%{transform:scale(1);}30%{transform:scale(.965);}100%{transform:scale(1);}}
  .punch{animation:punch .22s ease-out;}
  .hitflash{box-shadow:0 0 0 2px rgba(255,235,210,.9), 0 0 26px rgba(232,69,60,.55) !important;transition:box-shadow .05s;}
  .muzzle{box-shadow:0 0 0 2px rgba(255,244,214,.95), 0 0 34px rgba(255,210,120,.7) !important;transition:box-shadow .04s;}

  header{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid var(--line);padding:6px 2px 8px;margin-bottom:10px;}
  header h1{font-family:'Shippori Mincho',serif;font-weight:800;font-size:1.25rem;letter-spacing:.16em;}
  header .sub{color:var(--washi-dim);font-size:.7rem;letter-spacing:.2em;}
  #turnLabel{margin-left:auto;font-family:'Shippori Mincho',serif;color:var(--kane);font-size:.85rem;letter-spacing:.15em;}
  #muteBtn{
    background:none;border:1px solid var(--line);color:var(--washi-dim);
    border-radius:4px;font-size:.68rem;padding:3px 9px;cursor:pointer;letter-spacing:.1em;
    font-family:'Zen Kaku Gothic New',sans-serif;
  }
  #muteBtn:hover{border-color:var(--washi-dim);}

  #enemy{
    border:1px solid var(--line);border-radius:6px;padding:12px 14px;
    background:linear-gradient(180deg, rgba(70,64,58,.18), transparent);
    position:relative;transition:box-shadow .25s, transform .3s, filter .3s;
  }
  #enemy.staggerVis{transform:rotate(-1.4deg) translateY(2px);filter:saturate(.5) brightness(.85);}
  .nameRow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .uName{font-family:'Shippori Mincho',serif;font-weight:700;font-size:1.05rem;letter-spacing:.1em;}
  .intent{margin-left:auto;font-size:.8rem;color:var(--washi-dim);}
  .intent b{color:var(--hi-bright);font-size:1rem;font-family:'Shippori Mincho',serif;}
  .intent .pierce{color:#ff9a92;font-size:.72rem;}
  .intent .safe{color:#7fa8c0;font-size:.72rem;}
  .intent .stag{color:#ffb35e;}
  .hpWrap{margin-top:8px;}
  .hpBar{height:14px;border:1px solid var(--line);border-radius:3px;background:#0c0a08;overflow:visible;position:relative;}
  .hpFill{height:100%;background:linear-gradient(90deg,#7e1d20,var(--hi));transition:width .25s;position:relative;z-index:1;border-radius:2px;}
  .hpFill.player{background:linear-gradient(90deg,#5a4720,var(--kane));}
  .hpGhost{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(90deg,#4a0d0f,#8a181b);
    transition:width 1.35s cubic-bezier(.15,.75,.25,1) .2s;
  }
  .drip{
    position:absolute;top:100%;width:5px;border-radius:0 0 5px 5px;
    background:linear-gradient(180deg,#8a181b,#3f0a0c);
    animation:drip 1.5s ease-in forwards;
  }
  @keyframes drip{
    0%{height:0;opacity:.95;}
    50%{height:13px;opacity:.9;}
    100%{height:22px;opacity:0;transform:translateY(10px);}
  }
  .hpNum{font-size:.78rem;color:var(--washi-dim);margin-top:3px;display:flex;justify-content:space-between;}
  .hpNum .lowHp{color:var(--hi-bright);font-weight:700;animation:lowPulse 1.1s infinite;}
  @keyframes lowPulse{0%,100%{opacity:1;}50%{opacity:.45;}}
  .blockBadge{
    display:inline-block;min-width:1.8em;text-align:center;
    border:1px solid #5d7a8a;color:#9fc4d8;border-radius:3px;font-size:.75rem;padding:1px 5px;margin-left:8px;
  }
  .tagiriBadge{
    display:inline-block;border:1px solid var(--tagiri);color:#6fd0b4;
    border-radius:3px;font-size:.75rem;padding:1px 7px;margin-left:8px;
  }

  #maai{
    border:1px solid var(--line);border-radius:6px;margin-top:10px;
    padding:8px 14px 10px;position:relative;
    background:linear-gradient(180deg, rgba(70,64,58,.1), transparent);
    transition:border-color .3s, box-shadow .3s;
  }
  #maai.shichi{
    border-color:var(--hi);
    box-shadow:0 0 16px rgba(195,39,43,.25) inset, 0 0 10px rgba(195,39,43,.2);
    animation:shichiPulse 1.2s ease-in-out infinite;
  }
  @keyframes shichiPulse{
    0%,100%{box-shadow:0 0 14px rgba(195,39,43,.2) inset;}
    50%{box-shadow:0 0 26px rgba(195,39,43,.45) inset;}
  }
  #maai .mTop{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  #maai .mTitle{font-size:.66rem;color:var(--washi-dim);letter-spacing:.3em;}
  #maaiName{font-family:'Shippori Mincho',serif;font-weight:800;font-size:1.05rem;letter-spacing:.3em;color:var(--washi);}
  #maai.shichi #maaiName{color:var(--hi-bright);}
  #maaiMods{margin-left:auto;font-size:.7rem;color:var(--washi-dim);}
  #maaiMods .ga{color:var(--kane);}
  #maaiMods .mo{color:#9fc4d8;}
  .mLine{position:relative;height:30px;margin-top:6px;}
  .mRail{position:absolute;left:26px;right:26px;top:50%;height:2px;background:var(--line);}
  .mNotch{position:absolute;top:50%;width:2px;height:9px;transform:translateY(-50%);background:var(--tetsu);}
  .mFoe,.mKnight{
    position:absolute;top:50%;transform:translate(-50%,-50%);
    font-family:'Shippori Mincho',serif;font-weight:800;font-size:1rem;
    width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  }
  .mFoe{left:16px;background:#2a1414;border:1px solid var(--hi);color:var(--hi-bright);}
  .mKnight{background:#241d12;border:1px solid var(--kane);color:var(--kane);transition:left .45s cubic-bezier(.3,1.3,.4,1);}
  #maaiHint{font-size:.62rem;color:var(--washi-dim);letter-spacing:.05em;}
  #maaiHint .fire{color:var(--hi-bright);}

  #player{
    border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-top:10px;
    background:linear-gradient(180deg, rgba(199,154,62,.06), transparent);
    position:relative;
  }
  .buffRow{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;min-height:1.4em;}
  .buff{font-size:.74rem;border-radius:3px;padding:2px 8px;letter-spacing:.05em;}
  .buff.martyr{border:1px solid var(--hi);color:var(--hi-bright);}
  .buff.bless{border:1px solid var(--kane);color:var(--kane);}
  .buff.oath{border:1px solid #7a6aa0;color:#b0a0d8;}
  .buff.kakugo{border:1px solid var(--kane);color:var(--kane);background:rgba(199,154,62,.08);}
  .buff.mikiri{border:1px solid var(--mikiri);color:var(--mikiri);}
  .buff.pulse{animation:buffPulse .45s ease-out;}
  @keyframes buffPulse{
    0%{transform:scale(1);}35%{transform:scale(1.22);box-shadow:0 0 14px rgba(232,69,60,.6);}100%{transform:scale(1);}
  }

  #kakugoWrap{margin-top:9px;}
  #kakugoLabel{display:flex;font-size:.68rem;color:var(--washi-dim);letter-spacing:.15em;margin-bottom:3px;}
  #kakugoLabel b{color:var(--kane);font-family:'Shippori Mincho',serif;margin-left:6px;letter-spacing:.1em;}
  #kakugoRankName{margin-left:auto;color:var(--kane);font-family:'Shippori Mincho',serif;}
  .kBar{height:8px;border:1px solid var(--line);border-radius:3px;background:#0c0a08;position:relative;overflow:visible;}
  .kFill{
    height:100%;border-radius:2px;width:0%;
    background:linear-gradient(90deg,#6e5520,var(--kane),#f0cf7e);
    box-shadow:0 0 8px rgba(199,154,62,.5);
    transition:width .5s ease-out;
  }
  .kBar.maxed .kFill{animation:kMax 1s ease-in-out infinite;}
  @keyframes kMax{
    0%,100%{box-shadow:0 0 8px rgba(199,154,62,.5);}
    50%{box-shadow:0 0 18px rgba(240,207,126,.95);}
  }
  .kTick{position:absolute;top:-3px;width:2px;height:14px;background:var(--washi-dim);opacity:.6;}
  .kTick span{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    font-size:.58rem;color:var(--washi-dim);white-space:nowrap;letter-spacing:.05em;
  }

/* ════════════════ 状態 ════════════════ */
let S = null;
let armedIdx = -1, busy = false, lastMartyr = 0, endArmed = false;

function initGame(){
  S = {
    turn: 1,
    pHp: 60, pMax: 60, pBlock: 0, tagiri: 0,
    eHp: 100, eMax: 100,
    energy: 3, energyMax: 3,
    sword: "long",
    martyr: 0, bless: 0, mikiri: 0,
    sekinen: 0, tagiriMult: 1,
    maai: 1,
    kakugoRank: 0,
    kaishakuUsed: false,
    combo: 0, turnDmg: 0,
    overkill: 0, maxHit: 0,
    maaiSum: 0, maaiN: 0, maaiShichiN: 0,
    swordUse: {long:0, dagger:0, spear:0},
    bloodPays: 0, mikiriCount: 0, dmgTaken: 0,
    fury: 0, enraged: false,
    staggered50: false, staggered25: false, enemyStaggered: false,
    wonByKai: false,
    oath: null,
    deck: shuffle(DECK_LIST.slice()),
    hand: [], discard: [],
    patIdx: 0, loop: 0, rage: 0,
    bloodSpent: 0,
  };
  armedIdx = -1; busy = false; lastMartyr = 0; endArmed = false;
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("log").innerHTML = "";
  document.getElementById("vignette").classList.remove("low");
  document.getElementById("dimEdges").classList.remove("low");
  document.getElementById("enemy").classList.remove("staggerVis");
  document.body.classList.remove("adre1","adre2");
  showOathSelect();
}

function showOathSelect(){
  const list = document.getElementById("oathList");
  list.innerHTML = "";
  for(const id of Object.keys(OATHS)){
    const o = OATHS[id];
    const b = document.createElement("button");
    b.className = "oath";
    b.innerHTML = '<div class="oName">' + o.name + '</div>' +
                  '<div class="oBoon">恩寵: ' + o.boon + '</div>' +
                  '<div class="oBane">代償: ' + o.bane + '</div>';
    b.onclick = ()=>chooseOath(id);
    list.appendChild(b);
  }
  document.getElementById("oathModal").classList.add("show");
}

function chooseOath(id){
  S.oath = id;
  if(id==="fusyaku"){ S.pMax += 20; S.pHp += 20; }
  if(id==="shikkoku"){ S.energyMax += 1; S.pMax -= 15; S.pHp = Math.min(S.pHp, S.pMax); }
  document.getElementById("oathModal").classList.remove("show");
  sfx("gacha");
  log("──「銃声の中を、刀ひとつで」──","sys");
  log("「" + OATHS[id].name + "」を立てた。", "gold");
  log("攻撃カードは踏み込む。踏み込めば銃火を浴びる。防御カードは間を切る。","sys");
  startTurn();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function oathAtk(){ return S.oath==="syura" ? 2 : 0; }
function kakugoAtk(){ return (S.kakugoRank>=1?2:0) + (S.kakugoRank>=3?3:0); }
function maaiAtk(){ return MAAI_MOD[S.sword][S.maai].atk; }
function maaiDef(){ return MAAI_MOD[S.sword][S.maai].def; }
function effCost(card){ return card.cost + (card.magic ? 0 : S.sekinen); }
function effSelf(card){ return card.selfDmg ? card.selfDmg + S.sekinen : 0; }
function effHits(card){ return card.hits + (card.key==="nirenzashi" ? S.sekinen : 0); }
function effDraw(card){ return card.draw ? card.draw + S.sekinen : 0; }
function effBlock(card){ return card.block ? card.block + S.sekinen : 0; }
function effHeal(card){ return card.heal ? card.heal + S.sekinen : 0; }
function effStep(card){
  if(!card.step) return 0;
  return card.step > 0 ? card.step + S.sekinen : card.step - S.sekinen;
}
function effKakugoLoss(card){ return card.kakugoLoss ? card.kakugoLoss + S.sekinen : 0; }
function effBase(card){
  if(card.kind==="kaishaku") return S.bloodSpent * (1 + S.sekinen);
  const b = card.special==="ugachi" ? Math.ceil((S.pMax - S.pHp)/2) : card.dmg;
  return b + (card.magic ? 0 : S.sekinen);
}
function atkBonus(){ return S.martyr + S.bless + S.mikiri + oathAtk() + kakugoAtk() + maaiAtk(); }
function gainBlock(n){
  let v = Math.max(0, n + maaiDef());
  if(S.oath==="syura") v = Math.ceil(v/2);
  S.pBlock += v;
  return v;
}
function enemyVolley(mv){
  return mv.reload ? 0 : mv.atk * (mv.hits||1) + S.rage + S.fury;
}
function advanceFireDmg(){
  const mv = ENEMY_PATTERN[S.patIdx];
  if(mv.reload || S.enemyStaggered) return 0;
  return Math.ceil(enemyVolley(mv) * 0.5);
}

/* ════════════════ ターン進行 ════════════════ */
function startTurn(){
  S.energy = S.energyMax;
  S.pBlock = 0;
  S.tagiri = 0;
  S.combo = 0;
  S.turnDmg = 0;
  endArmed = false;
  drawCards(5);
  showBanner(S.turn + " 太刀目", "");
  log("── " + S.turn + " 太刀目 ──","sys");
  render();
}

function drawCards(n){
  let drew = 0;
  for(let i=0;i<n;i++){
    if(S.deck.length===0){
      if(S.discard.length===0) break;
      S.deck = shuffle(S.discard); S.discard = [];
      log("捨て札を切り直した。","sys");
    }
    S.hand.push(S.deck.pop());
    drew++;
  }
  if(drew>0) sfx("draw");
}

function endTurn(){
  if(busy) return;
  const canStillPlay = S.energy > 0 && S.hand.some(k => isPlayable(CARDS[k]));
  if(canStillPlay && !endArmed){
    endArmed = true;
    render();
    return;
  }
  endArmed = false;
  busy = true; armedIdx = -1;
  S.discard.push(...S.hand);
  S.hand = [];
  if(S.turnDmg > 0) showTurnTotal(S.turnDmg);
  if(S.oath==="fusyaku" && S.pHp > 1){
    const d = Math.min(2, S.pHp - 1);
    log("誓いが血を求める(HP -" + d + ")", "dmg");
    loseHP(d, "oath");
  }
  showBanner("敵 ノ 手 番", "foe");
  render();
  setTimeout(enemyAct, 850);
}

function enemyAct(){
  const move = ENEMY_PATTERN[S.patIdx];
  if(S.enemyStaggered){
    // 怯み: 動けない。回復時に激昂する
    log("銃士は体勢を崩している──動けない!", "gold");
    S.enemyStaggered = false;
    S.fury += 3;
    document.getElementById("enemy").classList.remove("staggerVis");
    log("銃士が立ち上がる。眼の色が変わった──激昂(以降の攻撃 +" + S.fury + ")", "dmg");
    if(S.staggered25 && !S.enraged){
      S.enraged = true;
      log("銃士は装填を捨てた──撃ち続ける気だ!", "dmg");
    }
    // 怯み中は後退もしない(詰め放題)
  } else if(move.reload){
    sfx("reload");
    log("銃士は弾を込めている──撃ってこない。", "sys");
    retreatEnemy();
    advancePattern();
  } else {
    const hits = move.hits || 1;
    let atk = enemyVolley(move);
    if(S.sword==="long"){ atk = Math.max(0, atk - 2); }
    const blockBefore = S.pBlock;
    const just = atk > 0 && blockBefore === atk;   // 見切り: ぴったり同値
    const blocked = Math.min(S.pBlock, atk);
    const rem = atk - blocked;
    for(let h=0; h<hits; h++){
      setTimeout(()=>{ muzzleFlash(); sfx("gunshot"); }, h*150);
    }
    log("銃士の「" + move.name + "」! " + atk + " の銃弾" +
        (hits>1 ? "(" + move.atk + "×" + hits + "連射)" : "") +
        (S.sword==="long" ? "(長剣が弾を弾いた)" : ""), "dmg");
    if(blocked>0) log("ブロックで " + blocked + " を受け止めた。");
    S.pBlock -= blocked;
    if(just){
      S.mikiri += 5;
      S.mikiriCount++;
      sfx("parry");
      goldFlash();
      vibrate([20,30,20,30,60]);
      showBanner("見 切 ッ タ", "mikiri");
      log("一弾も余さず、ぴたりと受けた──見切り! 次の攻撃 +5", "mikiri");
    }
    if(rem>0){
      const lost = loseHP(rem, "enemy");
      if(lost > 0) popDamage(document.getElementById("player"), "-"+lost, "hurt");
      else popDamage(document.getElementById("player"), "防", "heal");
    } else if(blocked>0 || atk===0){
      if(!just) popDamage(document.getElementById("player"), "防", "heal");
    }
    shakeScreen(false);
    retreatEnemy();
    advancePattern();
  }
  if(checkEnd()) return;
  S.turn++;
  busy = false;
  startTurn();
}

function retreatEnemy(){
  if(S.maai > 0){
    S.maai--;
    log("銃士が飛び退き、間合いを切った──「" + MAAI[S.maai].name + "」", "sys");
  }
}

function advancePattern(){
  S.patIdx++;
  if(S.patIdx >= ENEMY_PATTERN.length){
    S.patIdx = 0; S.loop++;
    S.rage = S.loop * 2;
    log("銃士の焦りが引き金に乗る…(以降の攻撃 +" + S.rage + ")", "dmg");
  }
  // 激昂後は装填を捨てる
  if(S.enraged && ENEMY_PATTERN[S.patIdx].reload){
    S.patIdx++;
    if(S.patIdx >= ENEMY_PATTERN.length){
      S.patIdx = 0; S.loop++;
      S.rage = S.loop * 2;
      log("銃士の焦りが引き金に乗る…(以降の攻撃 +" + S.rage + ")", "dmg");
    }
  }
}

/* ════════════════ 間合い移動 ════════════════ */
function stepIn(n){
  for(let i=0;i<n;i++){
    if(S.maai >= MAAI.length-1){
      log("これ以上は詰められない。","sys");
      break;
    }
    let dmg = advanceFireDmg();
    if(dmg <= 0){
      S.maai++;
      sfx("step");
      vibrate(15);
      log((S.enemyStaggered ? "銃士は怯んでいる" : "銃士は装填中") + "──無傷で詰めた!「" + MAAI[S.maai].name + "」", "gold");
      continue;
    }
    muzzleFlash();
    sfx("gunshot");
    vibrate([25,20,35]);
    const blocked = Math.min(S.pBlock, dmg);
    S.pBlock -= blocked; dmg -= blocked;
    S.maai++;
    log("踏み込んだ──「" + MAAI[S.maai].name + "」。銃火が走る!", "gold");
    if(blocked>0) log("ブロックで " + blocked + " を受け止めた。");
    if(dmg > 0){
      const cap = Math.max(0, S.pHp - 1);
      const actual = Math.min(dmg, cap + S.tagiri);
      if(actual > 0){
        const lost = loseHP(Math.min(dmg, actual), "advance");
        if(lost > 0) popDamage(document.getElementById("player"), "-"+lost, "hurt");
      }
    } else {
      popDamage(document.getElementById("player"), "防", "heal");
    }
  }
}
function stepBack(n){
  let moved = 0;
  for(let i=0;i<n;i++){
    if(S.maai <= 0) break;
    S.maai--; moved++;
  }
  if(moved > 0){
    sfx("step");
    log("間を切った──「" + MAAI[S.maai].name + "」", "sys");
  }
}

/* ════════════════ カードプレイ ════════════════ */
function canPay(card){
  const cost = effCost(card);
  if(S.energy >= cost) return {ok:true, blood:0};
  const lack = cost - S.energy;
  const bloodCost = lack * BLOOD_RATE;
  if(S.pHp > bloodCost) return {ok:true, blood:bloodCost};
  return {ok:false, blood:bloodCost};
}

function isPlayable(card){
  let selfCut = effSelf(card);
  if(card.sword==="dagger" && S.sword!=="dagger") selfCut += 1;
  if(selfCut > 0 && S.pHp <= selfCut && S.tagiri < selfCut) return false;
  return canPay(card).ok;
}

function clickCard(idx){
  if(busy) return;
  const key = S.hand[idx];
  const card = CARDS[key];
  if(!isPlayable(card)){
    if((card.selfDmg||0) > 0 || card.sword==="dagger") log("まだ死ねない。その血は払えぬ。","sys");
    else log("気力も血も足りない。","sys");
    return;
  }
  const pay = canPay(card);
  if(pay.blood > 0 && armedIdx !== idx){
    armedIdx = idx;
    render();
    return;
  }
  armedIdx = -1;
  flyCard(idx);
  playCard(idx, pay);
}

function playCard(idx, pay){
  vibrate(12);
  endArmed = false;
  S.combo++;
  if(S.combo >= 2) showCombo(S.combo);
  const key = S.hand.splice(idx,1)[0];
  const card = CARDS[key];
  S.discard.push(key);

  if(card.sword && card.sword !== S.sword){
    setStance(card.sword);
    if(checkEnd()) return;
  }
  S.swordUse[S.sword]++;
  S.maaiSum += S.maai; S.maaiN++;
  if(S.maai === 3) S.maaiShichiN++;

  const cost = effCost(card);
  const energyUsed = Math.min(S.energy, cost);
  S.energy -= energyUsed;
  if(pay.blood > 0){
    S.bloodPays++;
    log("気力が足りぬ…己の血で払う(HP -" + pay.blood + ")", "dmg");
    loseHP(pay.blood, "blood");
  }
  log("「" + card.name + "」");

  if(card.selfDmg){
    loseHP(effSelf(card), "self");
  }

  const st = effStep(card);
  if(st > 0){ stepIn(st); if(checkEnd()) return; }

  if(card.kind === "attack"){
    const base = effBase(card);
    const hits = effHits(card);
    const bonus = atkBonus();
    const per = Math.max(0, base + bonus);
    const total = per * hits;
    if(S.martyr>0){ log("痛みが刃に変わる(+" + S.martyr + ")", "dmg"); }
    if(S.mikiri>0){ log("見切りが刃を導く(+" + S.mikiri + ")", "mikiri"); }
    if(S.bless>0){ log("祝福が宿る(+" + S.bless + ")", "gold"); }
    if(maaiAtk()!==0){ log("間合い「" + MAAI[S.maai].name + "」(" + (maaiAtk()>0?"+":"") + maaiAtk() + ")", maaiAtk()>0?"dmg":"sys"); }
    if(per===0){ log("……届かない。" + SWORDS[S.sword].name + "はこの間合いでは無力だ。", "sys"); }
    const boosted = bonus > 0;
    S.martyr = 0; S.mikiri = 0;
    dealToEnemy(total, hits, per, boosted, pay.blood > 0);
    if(pay.blood > 0 && S.sword==="spear"){
      log("血で払った技は滾らない。槍は臆病者のための武器だ。", "sys");
    }
  }
  if(card.block){
    const v = gainBlock(effBlock(card));
    popDamage(document.getElementById("player"), "盾+" + v, "heal");
    log("ブロック " + v + " を得た。" +
        (maaiDef()>0 ? "(遠間が守りを固めた+" + maaiDef() + ")" : (maaiDef()<0 ? "(間合いが近く守りが薄い" + maaiDef() + ")" : "")) +
        (S.oath==="syura" ? "(誓いが半減)" : ""));
  }
  if(card.heal){
    const h = effHeal(card);
    S.pHp = Math.min(S.pMax, S.pHp + h);
    const kl = effKakugoLoss(card);
    if(kl > 0){ S.bloodSpent = Math.max(0, S.bloodSpent - kl); }
    sfx("heal");
    popDamage(document.getElementById("player"), "+" + h, "heal");
    log("傷口に晒を巻いた(HP +" + h + ")。覚悟が " + kl + " 鈍った。", "heal");
  }
  if(st < 0){ stepBack(-st); }

  if(card.magic && key === "seikon"){
    const lost = S.pHp - 1;
    if(lost > 0){
      S.bless += lost;
      sfx("seikon");
      loseHP(lost, "seikon");
      popDamage(document.getElementById("player"), "祝福+" + lost, "boost");
      log("全身が裂け、" + lost + " の祝福が刻まれた。攻撃 +" + lost + "(永続)", "gold");
    } else {
      log("もはや捧げる血が残っていない。","sys");
    }
  }
  if(card.magic && key === "sekinen"){
    S.sekinen += 1;
    sfx("seikon");
    popDamage(document.getElementById("player"), "積年+" + S.sekinen, "boost");
    log("錆は等しく、すべてに積もる。カードの数字がすべて +" + S.sekinen + " された。", "gold");
  }
  if(card.magic && key === "kawaki"){
    S.tagiriMult *= 2;
    sfx("seikon");
    popDamage(document.getElementById("player"), "渇き ×" + S.tagiriMult, "tagiri");
    log("渇きは増すばかり──滾りの獲得が " + S.tagiriMult + " 倍になった。", "tagiri");
  }
  if(card.draw){
    drawCards(effDraw(card));
  }

  if(checkEnd()) return;
  render();
}

function playKaishaku(){
  if(busy || S.kaishakuUsed || S.kakugoRank < 3) return;
  const pay = canPay(KAI_CARD);
  if(!pay.ok){ log("気力も血も足りない。","sys"); return; }
  busy = true;
  S.kaishakuUsed = true;
  endArmed = false;
  const cost = effCost(KAI_CARD);
  const energyUsed = Math.min(S.energy, cost);
  S.energy -= energyUsed;
  if(pay.blood > 0){
    S.bloodPays++;
    log("気力が足りぬ…己の血で払う(HP -" + pay.blood + ")", "dmg");
    loseHP(pay.blood, "blood");
  }
  render();
  const wrap = document.getElementById("kaiWrap");
  const slash = document.getElementById("kaiSlash");
  const vw = window.innerWidth, vh = window.innerHeight;
  const y1 = vh * 0.64, y2 = vh * 0.34;
  const ang = Math.atan2(y2 - y1, vw) * 180 / Math.PI;
  slash.style.top = y1 + "px";
  slash.style.width = Math.hypot(vw, y2 - y1) + "px";
  slash.style.setProperty("--kang", ang + "deg");
  wrap.className = "on";
  void wrap.offsetWidth;
  wrap.classList.add("dark");
  sfx("kaiDark");
  setTimeout(()=>{
    wrap.classList.add("flash");
    sfx("kaiSlash");
    vibrate([60,30,140]);
  }, 380);
  setTimeout(()=>{
    wrap.classList.add("split");
    const dmg = S.bloodSpent * (1 + S.sekinen);
    showBanner("介 錯 一 閃", "rankup");
    log("流したすべての血が、一太刀に宿る" + (S.sekinen>0 ? "(積年 ×" + (1+S.sekinen) + ")" : "") + "。", "gold");
    dealToEnemy(dmg, 1, dmg, true, true);
    if(S.eHp === 0) S.wonByKai = true;
    busy = false;
    if(!checkEnd()) render();
  }, 700);
  setTimeout(()=>{ wrap.className = ""; }, 1400);
}

function setStance(id){
  S.sword = id;
  vibrate([15,30,15]);
  sfx("gacha");
  log("ガチャッ ──「" + SWORDS[id].name + "」を抜いた。", "gold");
  if(id==="long"){
    const v = gainBlock(2);
    log("抜刀: ブロック " + v + "。");
  }
  if(id==="dagger"){
    if(S.pHp > 1){
      log("抜刀: 覚悟の皮一枚(HP -1)。");
      loseHP(1, "self");
    }
  }
  if(id==="spear"){
    log("抜刀: 穂先が走る。");
    dealToEnemy(2, 1, 2, false, true);
  }
  render();
  const el = document.querySelector(".sword.active");
  if(el){ el.classList.add("drawn"); setTimeout(()=>el.classList.remove("drawn"), 320); }
}

function dealToEnemy(total, hits, per, boosted, noTagiri){
  const before = S.eHp;
  S.eHp = Math.max(0, S.eHp - total);
  S.turnDmg += total;
  if(total > S.maxHit) S.maxHit = total;
  if(before > 0 && S.eHp === 0){
    S.overkill = total - before;
  }
  if(S.sword==="spear" && total > 0 && !noTagiri){
    const t = Math.floor(total * 0.25 * S.tagiriMult);
    if(t > 0){
      S.tagiri += t;
      log("血が滾る(+" + t + ")", "tagiri");
    }
  }
  const en = document.getElementById("enemy");
  const mega = per >= 18;
  for(let h=0; h<hits; h++){
    setTimeout(()=>{
      popDamage(en, per, (mega ? "boost mega" : (boosted ? "boost" : "")));
      sfx(mega ? "mega" : "slash", S.combo);
      spawnSlashFX(S.sword);
      en.classList.remove("punch"); void en.offsetWidth; en.classList.add("punch");
      en.classList.add("hitflash");
      setTimeout(()=>en.classList.remove("hitflash"), 90);
    }, h * 130);
  }
  if(mega || total >= 20){ hitStop(total >= 30 ? 95 : 70); }
  if(total >= 20){ shakeScreen(true); vibrate([40,30,60]); }
  log("銃士に " + total + " ダメージ" + (hits>1 ? "(" + hits + "連撃)" : "") + "!", "dmg");
  // 体幹崩し: HP50% / 25% を割った瞬間に怯む
  if(before > 0 && S.eHp > 0){
    let stag = false;
    if(!S.staggered50 && S.eHp <= S.eMax*0.5){ S.staggered50 = true; stag = true; }
    if(!S.staggered25 && S.eHp <= S.eMax*0.25){ S.staggered25 = true; stag = true; }
    if(stag) doStagger();
  }
}

function doStagger(){
  S.enemyStaggered = true;
  sfx("stagger");
  hitStop(110);
  vibrate([50,40,90]);
  showBanner("怯 ン ダ", "stagger");
  document.getElementById("enemy").classList.add("staggerVis");
  log("銃士の体幹が崩れた──次の手番、撃てない! 後退もしない。踏み込みも無傷だ!", "gold");

/* ════════════════ HP喪失 ════════════════ */
function loseHP(amount, source){
  let amt = amount;
  if(S.tagiri > 0 && source !== "seikon"){
    const t = Math.min(S.tagiri, amt);
    S.tagiri -= t; amt -= t;
    if(t > 0){
      log("滾りが " + t + " を喰い止めた。", "tagiri");
      popDamage(document.getElementById("player"), "滾 -" + t, "tagiri");
    }
  }
  if(amt <= 0){ render(); return 0; }
  if(source==="advance"){ amt = Math.min(amt, Math.max(0, S.pHp - 1)); if(amt<=0){ render(); return 0; } }
  S.pHp = Math.max(0, S.pHp - amt);
  if(source==="enemy" || source==="advance") S.dmgTaken += amt;
  bloodFlash();
  const intensity = source==="seikon" ? 3 : (amt>=6 ? 2 : 1);
  spawnBlood(intensity);
  spawnDrips();
  if(source!=="enemy" && source!=="advance") sfx("blood");
  if(source==="enemy") playerHurtFX();
  vibrate(source==="seikon" ? [60,40,100] : [20 + amt*4]);
  if(S.sword === "dagger" && S.pHp > 0){
    S.martyr += 3;
    log("殉教者の短剣が疼く(次の攻撃 +" + S.martyr + ")", "dmg");
  }
  if(source!=="enemy"){
    S.bloodSpent += amt;
    checkKakugo();
  }
  return amt;
}

function checkKakugo(){
  let newRank = S.kakugoRank;
  for(let i=0;i<RANKS.length;i++){
    if(S.bloodSpent >= RANKS[i].need && i+1 > newRank) newRank = i+1;
  }
  while(S.kakugoRank < newRank){
    S.kakugoRank++;
    const r = RANKS[S.kakugoRank-1];
    if(S.kakugoRank===2){ S.energyMax++; S.energy++; }
    goldFlash();
    sfx("rankup");
    vibrate([30,40,30,40,80]);
    showBanner("位 " + "一二三"[S.kakugoRank-1] + "「" + r.name + "」", "rankup");
    log("覚悟が位に達した──「" + r.name + "」: " + r.effect + "(下位の恩恵もすべて乗る)", "gold");
  }
}

function battleStats(){
  const avgIdx = S.maaiN > 0 ? Math.round(S.maaiSum / S.maaiN) : 1;
  const fav = Object.keys(S.swordUse).reduce((a,b)=>S.swordUse[a]>=S.swordUse[b]?a:b);
  return {
    avgIdx: avgIdx,
    avgMaai: MAAI[Math.min(MAAI.length-1, Math.max(0, avgIdx))].name,
    favSword: S.maaiN > 0 ? SWORDS[fav].name : "──",
    shichiRate: S.maaiN > 0 ? S.maaiShichiN / S.maaiN : 0,
  };
}

function earnTitle(win){
  const st = battleStats();
  if(win && S.wonByKai) return "介錯人";
  if(st.shichiRate >= 0.7) return "死人剣士";
  if(win && S.dmgTaken === 0) return "弾の間を歩く者";

  if(S.bloodPays >= 6) return "血染めの放蕩者";

/* リザルトのカウントアップ */
function runCountUps(){
  const els = document.querySelectorAll("#overlay .cu");
  els.forEach((el, i)=>{
    const target = parseInt(el.dataset.v, 10) || 0;
    const dur = 750;
    const start = performance.now() + i * 90;
    function tick(now){
      const p = Math.min(1, (now - start) / dur);
      if(p <= 0){ requestAnimationFrame(tick); return; }
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased);
      if(p < 1) requestAnimationFrame(tick);
      else el.textContent = target;
    }
    requestAnimationFrame(tick);
  });
}

/* ════════════════ 描画 ════════════════ */
function buildCardEl(c, opts){
  const div = document.createElement("div");
  let cls = "card";
  if(c.magic) cls += " magic";
  if(c.kind==="kaishaku") cls += " kai";
  if(opts.unplayable) cls += " unplayable";
  if(opts.bloodNeed) cls += " bloodNeed";
  if(opts.armed) cls += " armed";
  div.className = cls;
  const swName = {long:"長剣技", dagger:"短剣技", spear:"槍技"};
  let typeLabel = c.kind==="kaishaku" ? "必殺・覚悟の証"
                : c.magic ? "魔法・" + swName[c.sword]
                : (c.sword ? swName[c.sword] : "共通技");
  if(opts.willSwitch) typeLabel += ' <span class="sw">⇒抜刀</span>';
  let stepLine = "";
  const st = effStep(c);
  if(st > 0) stepLine = '<div class="cStep">踏み込み ' + st + '(銃火 ' + advanceFireDmg() + '×' + st + ')</div>';
  if(st < 0) stepLine = '<div class="cStep back">一歩退く(' + (-st) + ')</div>';
  let calc = "";
  if(c.kind === "attack" || c.kind === "kaishaku"){
    let per;
    if(c.kind === "kaishaku"){
      per = effBase(c);
    } else {
      const sid = c.sword || S.sword;
      const pm = Math.min(MAAI.length - 1, S.maai + Math.max(0, effStep(c)));
      per = Math.max(0, effBase(c) + S.martyr + S.bless + S.mikiri + oathAtk() + kakugoAtk() + MAAI_MOD[sid][pm].atk);
    }
    const hits = effHits(c);
    const cls2 = per > effBase(c) || (c.kind==="kaishaku" && S.sekinen>0) ? "up" : "";
    calc = '<div class="cCalc ' + cls2 + '">今撃てば <b>' + per + (hits>1 ? "×" + hits : "") + "</b></div>";
  }
  if(c.block){
    const v0 = Math.max(0, effBlock(c) + maaiDef());
    const v = S.oath==="syura" ? Math.ceil(v0/2) : v0;
    const cls3 = maaiDef() > 0 ? "up" : "";
    calc = '<div class="cCalc ' + cls3 + '">今守れば <b>' + v + "</b></div>";
  }
  div.innerHTML = '<div class="cost">' + effCost(c) + '</div>' +
                  '<div class="cName">' + c.name + '</div>' +
                  '<div class="cType">' + typeLabel + '</div>' +
                  '<div class="cDesc">' + c.desc + "</div>" + stepLine + calc +
                  '<div class="cNote">' + (opts.note||"") + "</div>";
  return div;
}

        : S.pHp + " / " + S.pMax;

  document.body.classList.toggle("adre1", adre===1);
  document.body.classList.toggle("adre2", adre===2);

    d.style.top  = (12+Math.random()*68)+"vh";
    d.style.setProperty("--rot",(Math.random()*360)+"deg");
    layer.appendChild(d);
    setTimeout(()=>d.remove(), 900);
  }
}
function spawnDrips(){
  const bar = document.getElementById("playerHpBar");
  if(!bar) return;

/* ════════════════ 効果音(WebAudio) ════════════════ */
let AC = null, muted = false, heartTimer = null, taikoTimer = null, taikoLevel = 0;
function ac(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return AC;
}
function tone(ctx,t,freq,dur,type,vol,glideTo){
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t+dur+0.02);
}
function noiseBurst(ctx,t,dur,cutoff,vol){
  const len=Math.floor(ctx.sampleRate*dur), buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const s=ctx.createBufferSource(); s.buffer=buf;
  const f=ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=cutoff;
  const g=ctx.createGain(); g.gain.value=vol;
  s.connect(f); f.connect(g); g.connect(ctx.destination);
  s.start(t);
}
function sfx(type, p){
  if(muted) return;
  const ctx = ac(); if(!ctx) return;
  try{
    if(ctx.state==="suspended") ctx.resume();
    const t = ctx.currentTime;
    if(type==="slash"){
      const k = 1 + Math.min(p||0, 8) * 0.1;
      noiseBurst(ctx,t,0.1,2200*k,0.45);
      tone(ctx,t,1400*k,0.06,"triangle",0.12,500*k);
    }
    else if(type==="mega"){
      noiseBurst(ctx,t,0.22,2600,0.6);
      tone(ctx,t,180,0.3,"sawtooth",0.3,40);
      tone(ctx,t+0.03,1800,0.1,"triangle",0.15,300);
    }
    else if(type==="gunshot"){
      noiseBurst(ctx,t,0.08,5200,0.55);
      tone(ctx,t,150,0.13,"square",0.3,45);
      tone(ctx,t+0.01,2400,0.04,"sawtooth",0.1,700);
      noiseBurst(ctx,t+0.05,0.18,900,0.18);
    }
    else if(type==="blood"){ tone(ctx,t,120,0.16,"sine",0.4,45); noiseBurst(ctx,t,0.1,420,0.25); }
    else if(type==="gacha"){ tone(ctx,t,900,0.035,"square",0.13); tone(ctx,t+0.07,640,0.05,"square",0.13); }
    else if(type==="reload"){
      tone(ctx,t,500,0.04,"square",0.18);
      noiseBurst(ctx,t+0.02,0.05,1200,0.2);
      tone(ctx,t+0.16,380,0.05,"square",0.2);
      noiseBurst(ctx,t+0.18,0.07,900,0.25);
    }
    else if(type==="step"){ noiseBurst(ctx,t,0.06,800,0.3); tone(ctx,t,220,0.07,"sine",0.2,120); }
    else if(type==="heal"){ tone(ctx,t,520,0.1,"sine",0.18); tone(ctx,t+0.09,720,0.16,"sine",0.16); }
    else if(type==="seikon"){ tone(ctx,t,62,0.9,"sine",0.55,28); noiseBurst(ctx,t,0.45,900,0.35); tone(ctx,t+0.1,310,0.5,"triangle",0.12,80); }
    else if(type==="rankup"){
      tone(ctx,t,70,1.1,"sine",0.5,40);
      [392,523,659].forEach((f,i)=>tone(ctx,t+0.08+i*0.1,f,0.4,"triangle",0.18));
    }
    else if(type==="stagger"){
      noiseBurst(ctx,t,0.16,700,0.5);
      tone(ctx,t,420,0.3,"sawtooth",0.25,60);
      tone(ctx,t+0.12,180,0.25,"square",0.18,50);
    }
    else if(type==="parry"){
      tone(ctx,t,1850,0.5,"sine",0.25,1700);
      tone(ctx,t,1855,0.5,"sine",0.18,1690);
      noiseBurst(ctx,t,0.04,6000,0.25);
    }
    else if(type==="taiko"){
      tone(ctx,t,82,0.18,"sine",0.4,42);
      noiseBurst(ctx,t,0.05,260,0.2);
    }
    else if(type==="taiko2"){
      tone(ctx,t,82,0.16,"sine",0.45,42);
      noiseBurst(ctx,t,0.05,260,0.22);
      tone(ctx,t+0.14,98,0.12,"sine",0.3,50);
    }
    else if(type==="kaiDark"){
      tone(ctx,t,48,0.8,"sine",0.5,30);
      noiseBurst(ctx,t,0.5,300,0.2);
    }
    else if(type==="kaiSlash"){
      noiseBurst(ctx,t,0.28,3200,0.7);
      tone(ctx,t,2200,0.14,"triangle",0.2,200);
      tone(ctx,t+0.05,90,0.5,"sawtooth",0.3,30);
    }
    else if(type==="hit"){ tone(ctx,t,95,0.14,"triangle",0.5,48); noiseBurst(ctx,t,0.06,300,0.3); }
    else if(type==="draw"){ tone(ctx,t,1250,0.03,"triangle",0.07); }
    else if(type==="beat"){ tone(ctx,t,58,0.1,"sine",0.45,46); tone(ctx,t+0.17,52,0.12,"sine",0.35,40); }
    else if(type==="win"){ [523,659,784].forEach((f,i)=>tone(ctx,t+i*0.13,f,0.32,"triangle",0.22)); }
    else if(type==="lose"){ tone(ctx,t,170,0.9,"sawtooth",0.2,55); }
  }catch(e){}
}
function setHeartbeat(on){
  if(on && !heartTimer){ heartTimer = setInterval(()=>sfx("beat"), 1100); }
  else if(!on && heartTimer){ clearInterval(heartTimer); heartTimer = null; }
}
/* 和太鼓: 死地=単打 / 覚悟最大=連打 */
function setTaiko(level){
  if(level === taikoLevel) return;
  taikoLevel = level;
  if(taikoTimer){ clearInterval(taikoTimer); taikoTimer = null; }
  if(level === 1){ taikoTimer = setInterval(()=>sfx("taiko"), 640); }
  if(level === 2){ taikoTimer = setInterval(()=>sfx("taiko2"), 420); }
}
document.getElementById("muteBtn").onclick = function(){
  muted = !muted;
  this.textContent = muted ? "音:消" : "音:入";
};
document.addEventListener("pointerdown", ()=>{ const c=ac(); if(c && c.state==="suspended") c.resume(); }, {once:true});

function showPile(which){
  const pile = which === "deck" ? S.deck : S.discard;
  const title = which === "deck" ? "山札の中身" : "捨て札の中身";
  const counts = {};
  for(const k of pile) counts[k] = (counts[k]||0) + 1;
  const keys = Object.keys(counts).sort((a,b)=>CARDS[a].name.localeCompare(CARDS[b].name,"ja"));
  let html = "";
  for(const k of keys){
    const c = CARDS[k];
    html += '<div class="row"><span class="n">' + c.name + ' ×' + counts[k] + '</span>' +
            '<span class="ct">気力' + effCost(c) + '</span>' +
            '<span class="ds">' + c.desc + '</span></div>';
  }
  if(keys.length === 0) html = '<div class="row"><span class="ds">空である。</span></div>';
  document.getElementById("pileTitle").textContent = title + "(" + pile.length + "枚)";
  document.getElementById("pileList").innerHTML = html;
  document.getElementById("pileModal").classList.add("show");
}
document.getElementById("deckBtn").onclick = ()=>showPile("deck");
document.getElementById("discardBtn").onclick = ()=>showPile("discard");

document.getElementById("endTurnBtn").onclick = endTurn;
initGame();
